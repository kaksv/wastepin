name: EAS Android Build

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build APK (preview)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: mobile

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          packager: npm

      - name: Build APK
        run: cd mobile && eas build --profile preview --platform android --non-interactive
        env:
          EAS_PROJECT_ROOT: ${{ github.workspace }}/mobile
          EXPO_PROJECT_ID: af8b55d9-ec2f-4963-8500-bbb472097937
